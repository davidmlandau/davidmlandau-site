name: Update watch radar

on:
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-watch-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate watch radar
        run: python3 tools/build-watch-radar.py --allow-errors

      - name: Commit updated watch data
        run: |
          if git diff --quiet -- data/watch-radar.json data/watch-digest.html; then
            echo "Watch radar already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/watch-radar.json data/watch-digest.html
          git commit -m "Update watch radar"
          git push
